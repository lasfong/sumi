name: "MA Crossover Simple"
version: "1.0"
description: |
  Simple trend-following strategy:
  - Entry when SMA(10) crosses above SMA(50).
  - Exit when SMA(10) crosses below SMA(50).
  - Fixed 1000-share position size.

indicators:
  - name: sma_short
    type: sma
    length: 10
  - name: sma_long
    type: sma
    length: 50

entry_rules:
  - dsl:
      cross_up: ["sma_short", "sma_long"]

exit_rules:
  - dsl:
      cross_down: ["sma_short", "sma_long"]

position_sizing:
  method: fixed_quantity
  quantity: 1000
